name: API Automation Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # -------------------------
  # JOB 1 - SMOKE TEST
  # -------------------------
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Smoke Test (1 iteration only)
        run: |
          newman run postman/api-test-collection.postman_collection.json \
            -e postman/api-test-env.postman_environment.json \
            -d postman/test-data.csv.csv \
            --iteration-count 1


  # -------------------------
  # JOB 2 - POSTMAN REGRESSION
  # -------------------------
  postman-regression:
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman + Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Create Reports Folder
        run: mkdir -p reports

      - name: Run Postman Regression
        run: |
          newman run postman/api-test-collection.postman_collection.json \
            -e postman/api-test-env.postman_environment.json \
            -d postman/test-data.csv.csv \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export ./reports/postman-report.html \
            --reporter-htmlextra-title "API Automation Test Results" \
            --reporter-htmlextra-showEnvironmentData true \
            --timeout-request 15000 \
            --delay-request 300 \
            --env-var "swapiBase=${{ secrets.SWAPI_BASE }}"

      - name: Upload Postman Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: ./reports


  # -------------------------
  # JOB 3 - PLAYWRIGHT REGRESSION
  # -------------------------
  playwright-regression:
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report



  # JOB 4 - RESULTS SUMMARY
 
  results:
    runs-on: ubuntu-latest
    needs: [postman-regression, playwright-regression]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## API Automation Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Postman Regression | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright Regression | Completed |" >> $GITHUB_STEP_SUMMARY